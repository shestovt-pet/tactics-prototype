<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Тиковый бой · прототип</title>
<style>
  body { margin:0; background:#0b0e1a; color:#e6ebff; font:14px/1.45 sans-serif; display:flex; flex-direction:column; align-items:center; }
  h1 { font-size:18px; margin:12px 0 8px; font-weight:600; }
  #wrap { display:flex; gap:14px; align-items:flex-start; padding-bottom:16px; }
  canvas { background:#10142a; border:1px solid #262c4e; border-radius:8px; cursor:crosshair; }
  #side { width:272px; display:flex; flex-direction:column; gap:10px; }
  #turnInfo { font-size:16px; font-weight:bold; }
  #turnInfo small { color:#8fa1d0; font-weight:normal; }
  #hint { color:#9fb0d8; font-size:12.5px; min-height:52px; }
  #abils { display:flex; flex-wrap:wrap; gap:6px; }
  .ab { background:#1a2140; color:#e6ebff; border:1px solid #33407a; border-radius:6px; padding:6px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; min-width:76px; font:12px sans-serif; }
  .ab small { color:#8fa1d0; }
  .ab:disabled { opacity:.35; cursor:default; }
  .ab.sel { border-color:#ffcf4d; }
  #end, #restart { background:#232b52; color:#e6ebff; border:1px solid #3a4784; border-radius:6px; padding:7px; cursor:pointer; }
  #end:disabled { opacity:.4; cursor:default; }
  #log { font-size:12px; color:#aab6dd; height:200px; overflow-y:auto; border-top:1px solid #262c4e; padding-top:6px; }
  #log div { margin-bottom:2px; }
  #cfg { display:flex; flex-wrap:wrap; gap:6px 10px; font-size:12px; color:#9fb0d8; align-items:center; }
  #cfg input[type=number] { width:42px; background:#141a33; color:#e6ebff; border:1px solid #33407a; border-radius:4px; padding:2px 4px; }
  #cfg input[type=range] { width:100px; }
  #banner { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(6,8,18,.72); flex-direction:column; gap:14px; }
  #bannerText { font-size:44px; font-weight:bold; }
  #bannerBtn { font-size:16px; padding:10px 22px; background:#232b52; color:#e6ebff; border:1px solid #3a4784; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>
<h1>Тиковый бой — мир движется только поступками</h1>
<div id="wrap">
  <canvas id="c" width="1040" height="660"></canvas>
  <div id="side">
    <div id="turnInfo">—</div>
    <div id="hint">Клик по земле — шаг, клик по врагу — фокус; способность → цель.</div>
    <div id="abils"></div>
    <button id="end">Завершить ход</button>
    <div id="cfg">
      <label>Наши <input id="nAIn" type="number" min="1" max="10"></label>
      <label>Враги <input id="nBIn" type="number" min="1" max="10"></label>
      <label>Лучн.А <input id="aArchIn" type="number" min="0" max="10"></label>
      <label>Лучн.Б <input id="bArchIn" type="number" min="0" max="10"></label>
      <label>ИИ-союзн. <input id="aiIn" type="number" min="0" max="10"></label>
      <label>сек/такт <input id="tickdurIn" type="range" min="0.08" max="0.9" step="0.02"></label>
      <button id="restart">Заново</button>
    </div>
    <div id="log"></div>
  </div>
</div>
<div id="banner"><div id="bannerText"></div><button id="bannerBtn">Ещё раз</button></div>
<script>
'use strict';
// =====================================================================
// ТИКОВЫЙ БОЙ. Главный закон: мир движется ТОЛЬКО поступками.
// Ни одна позиция и ни одно лицо не меняются «сами по себе» каждый кадр.
// Урок прошлого прототипа: непрерывная «работа ног» с целями в движущихся
// системах отсчёта порождала вечные орбиты («цирк»). Здесь каждая цель
// движения — неподвижная точка, выбранная в момент решения, с условием
// «дошёл — стой». Вне своего хода боец живёт только платными реакциями.
// =====================================================================

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// ---- Константы ----
const CONE_MIN = 0.12, CONE_MAX = 1.08, CONE_EASE = 1.7;
const CONE_R = 190, CONE_R_MIN = 0.30;
const TURN_RATE = 3.4;              // скорость визуального доворота (рендер)
const TURN_COST = 10;               // цена осознанного доворота, за радиан
const MOVE_COST = 0.16;             // цена шага за пиксель (вперёд)
const BACK_COST = 2.6;              // движение спиной — во столько раз дороже
const MOVE_BUDGET = 300;            // запас хода игрока за ход, px
const DEBT_MOVE_PEN = 45;           // штраф игроку к запасу хода за каждый долг реакции
const BREATHER = 30;                // восстановление внимания в начале хода
const COUNTER_COST = 12;
const FLANK_MULT = 1.6;
const LUNGE = 12, RECOIL_K = 0.05;  // клинч: выпад атакующего и отдача цели
const MOVE_EASE = 8, ROLL_EASE = 16;
const STANDOFF = 50;
const KITE = 185, MELEE_PANIC = 120, PANIC_RELEASE = 45;
// Ход ИИ — бюджет тиков, из которого складывается план
const TURN_TICKS = 7, TURN_TICKS_MIN = 3, STRIDE = 44;
// Реакции вне своего хода: редкие, платные, с потолком долга
const REACT_MAX = 2, REACT_CD = 1.1, REACT_R = 150;
const SIDESTEP = 26, SIDESTEP_COST = 6;
// Удар по возможности: пробежал сквозь чужой конус в досягаемости — получил
const OPP_RANGE = 56, OPP_COST = 8, OPP_DMG = 7;

// ---- Валуны: сквозь них не пройти и не увидеть ----
let OBST = [];
function makeObstacles() {
  const W = cv.width, H = cv.height, list = [];
  let guard = 0;
  while (list.length < 6 && guard++ < 400) {
    const r = 24 + Math.random() * 20;
    const x = 240 + Math.random() * (W - 480);
    const y = 70 + Math.random() * (H - 140);
    if (list.every(o => Math.hypot(o.x - x, o.y - y) > o.r + r + 80)) {
      list.push({ x, y, r });
    }
  }
  return list;
}
function segHitsObstacle(ax, ay, bx, by) {
  for (const o of OBST) {
    const dx = bx - ax, dy = by - ay, a2 = dx * dx + dy * dy;
    if (a2 < 1e-6) continue;
    let t = -((ax - o.x) * dx + (ay - o.y) * dy) / a2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + dx * t - o.x, cy = ay + dy * t - o.y;
    if (cx * cx + cy * cy < o.r * o.r) return true;
  }
  return false;
}
const clearLine = (a, b) => !segHitsObstacle(a.x, a.y, b.x, b.y);
function firstBlocking(ax, ay, bx, by, pad) {
  let best = null, bd = 1e9;
  for (const o of OBST) {
    const dx = bx - ax, dy = by - ay, a2 = dx * dx + dy * dy;
    if (a2 < 1e-6) continue;
    let t = -((ax - o.x) * dx + (ay - o.y) * dy) / a2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + dx * t - o.x, cy = ay + dy * t - o.y;
    const rr = o.r + pad;
    if (cx * cx + cy * cy < rr * rr && t < bd) { bd = t; best = o; }
  }
  return best;
}
// Обход валуна считается ОДИН раз в момент решения (не каждый кадр):
// цель подменяется неподвижной точкой на касательной со стороны цели.
function routeAround(fx, fy, gx, gy, R) {
  const o = firstBlocking(fx, fy, gx, gy, R + 6);
  if (!o) return { x: gx, y: gy };
  const toO = Math.atan2(o.y - fy, o.x - fx);
  const toT = Math.atan2(gy - fy, gx - fx);
  const side = Math.sign(angDiff(toO, toT)) || 1;
  const d = Math.hypot(o.x - fx, o.y - fy);
  const need = o.r + R + 12;
  const spread = Math.asin(Math.min(0.999, need / Math.max(need, d)));
  const tang = toO + side * (spread + 0.25);
  const reach = Math.min(Math.hypot(gx - fx, gy - fy), d + o.r);
  return { x: clampX(fx + Math.cos(tang) * reach), y: clampY(fy + Math.sin(tang) * reach) };
}

// ---- Трейты: рисунок боя, а не только скидки ----
const TRAITS = {
  strong: { key: 'strong', label: 'Сильный', labelF: 'Сильная', mark: 'С', col: '#ff9f6b',
            cheap: ['heavy', 'aoe'], mult: 0.55, standoff: 38, dmgMult: 1.4, style: 'давит' },
  agile:  { key: 'agile', label: 'Ловкий', labelF: 'Ловкая', mark: 'Л', col: '#8fe3ff',
            cheap: ['quick', 'roll', 'shot'], mult: 0.55, moveMult: 0.5, counterMult: 0.45,
            standoff: 60, dmgMult: 0.8, style: 'вьётся' },
  smart:  { key: 'smart', label: 'Умный', labelF: 'Умная', mark: 'У', col: '#c9a2ff',
            cheap: [], mult: 1, coneBonus: 0.26, attBonus: 45, standoff: 54, dmgMult: 1,
            flanker: true, style: 'обходит' },
};
const TKEYS = ['strong', 'agile', 'smart'];

// ---- Способности ----
const ABIL = {
  heavy:   { id: 'heavy', name: 'Сильный удар', cost: 36, dmg: 22, range: 60, kind: 'target',
             setPrio: true, flankable: true, knock: 300, shake: 13, frz: 0.10, ticks: 5,
             turn: 0.55, windup: 0.22, swingDur: 0.5, arc: 2.2,
             desc: 'много урона, долгий замах — 5 тиков; назначает цель приоритетной' },
  quick:   { id: 'quick', name: 'Быстрый удар', cost: 12, dmg: 9, range: 60, kind: 'target',
             noCounter: true, aggro: true, flankable: true, knock: 150, shake: 8, frz: 0.05,
             ticks: 2, turn: 0.22, windup: 0.12, swingDur: 0.34, arc: 1.5,
             desc: 'дёшево и быстро — 2 тика, без контратаки, тянет ярость цели' },
  aoe:     { id: 'aoe', name: 'АоЕ-удар', cost: 46, dmg: 12, range: 98, kind: 'cone',
             knock: 170, shake: 12, frz: 0.08, ticks: 4, turn: 0.6, windup: 0.2,
             swingDur: 0.55, arc: 2.8,
             desc: 'бьёт всех в конусе спереди — 4 тика' },
  recover: { id: 'recover', name: 'Перевести дух', restore: 55, kind: 'self', ticks: 3,
             desc: 'восстановить внимательность — 3 тика' },
  hold:    { id: 'hold', name: 'Держать стойку', restore: 16, kind: 'self', ticks: 1,
             desc: 'собраться: +внимание, защита режет урон и спасает от удара в спину — 1 тик' },
  roll:    { id: 'roll', name: 'Кувырок', cost: 18, dist: 120, kind: 'dir', ticks: 2,
             desc: 'рывок сквозь юнитов, без встречных атак — 2 тика' },
  shot:    { id: 'shot', name: 'Выстрел', cost: 18, dmg: 11, range: 300, kind: 'target',
             archer: true, noCounter: true, flankable: true, needCone: true, knock: 70,
             shake: 5, frz: 0.05, ticks: 3, turn: 0.08,
             desc: 'только стрелок: далёкий выстрел — 3 тика; цель должна быть в конусе' },
};
const KIT = {
  melee: ['heavy', 'quick', 'aoe', 'recover', 'hold', 'roll'],
  archer: ['shot', 'quick', 'recover', 'hold', 'roll'],
};

function costOf(u, ab) {
  if (!ab.cost) return 0;
  const t = TRAITS[u.trait];
  return Math.round(ab.cost * (t && t.cheap.includes(ab.id) ? t.mult : 1));
}
function moveCostOf(u) {
  const t = TRAITS[u.trait];
  return MOVE_COST * (t && t.moveMult ? t.moveMult : 1);
}
// Идти спиной вперёд дорого: цена растёт с углом между шагом и взглядом
function dirCostMult(u, ang) {
  return 1 + (BACK_COST - 1) * (Math.abs(angDiff(u.face, ang)) / Math.PI);
}
function moveCostDir(u, ang) { return moveCostOf(u) * dirCostMult(u, ang); }

// ---- Конус внимания ----
// Кривая с показателем CONE_EASE: потерял треть внимания — потерял половину сектора
function attK(u) {
  return Math.pow(Math.max(0, Math.min(1, u.att / u.attMax)), CONE_EASE);
}
function coneRange(u) { return CONE_R * (CONE_R_MIN + (1 - CONE_R_MIN) * attK(u)); }
function coneHalf(u) {
  const t = TRAITS[u.trait], b = t && t.coneBonus ? t.coneBonus : 0;
  return Math.min(1.35, CONE_MIN + b + (CONE_MAX - CONE_MIN) * attK(u));
}

// ---- Глобальное состояние ----
let units, order, turnPtr, round, active, phase, queue, beat, slowmo;
let floaters, bursts, arrows, freeze, shake, now = 0;
let pending = null, abilityUsed = false;
let nA = 5, nB = 5, aArch = 1, bArch = 1, aiAllies = 0, TICK_DUR = 0.3;

// ---- Бойцы ----
function makeUnits(cA, cB) {
  const list = [];
  const nmA = ['Кай', 'Гарт', 'Лира', 'Бран', 'Эйла', 'Торн', 'Мира', 'Рагн', 'Сольв', 'Хальд'];
  const nmB = ['Ворон', 'Ульф', 'Гром', 'Скар', 'Хель', 'Бьорн', 'Ярн', 'Кром', 'Драг', 'Морд'];
  const FEM = new Set(['Лира', 'Эйла', 'Мира', 'Сольв', 'Хель']);
  const playerCount = cA - Math.min(aiAllies, cA);
  // Свой оттенок каждому внутри палитры команды; стрелки ярче
  const colOf = (side, i, c, arc) => {
    const base = side === 'A' ? 196 : 348, span = side === 'A' ? 68 : 46;
    const h = ((base + (c > 1 ? (i / (c - 1)) * span : span / 2)) + 360) % 360;
    return `hsl(${h.toFixed(0)}, ${arc ? 92 : 60}%, ${arc ? 70 : 56}%)`;
  };
  // Шахматный строй: стрелки глубже в тылу
  const place = (i, c, isArcher, side) => {
    const cols = 2, rows = Math.ceil(c / cols), row = Math.floor(i / cols), col = i % cols;
    const gapY = Math.min(104, (cv.height - 90) / Math.max(1, rows));
    const depth = col * 70 + (row % 2) * 35 + (isArcher ? 104 : 0);
    return {
      x: side === 'A' ? 74 + depth : cv.width - 74 - depth,
      y: cv.height / 2 + (row - (rows - 1) / 2) * gapY,
    };
  };
  const mk = (i, c, side, arch, nm, init0) => {
    const arc = i >= c - arch;
    const p = place(i, c, arc, side);
    const tr = TKEYS[Math.floor(Math.random() * TKEYS.length)];
    const lab = FEM.has(nm[i]) ? TRAITS[tr].labelF : TRAITS[tr].label;
    return {
      name: `${nm[i]} ${lab}`, base: nm[i], trait: tr, traitLabel: lab,
      team: side, type: arc ? 'archer' : 'melee', col: colOf(side, i, c, arc),
      x: p.x, y: p.y, init: init0 - i * 6,
      ai: side === 'B' ? true : i >= playerCount,
    };
  };
  for (let i = 0; i < cA; i++) list.push(mk(i, cA, 'A', aArch, nmA, 100));
  for (let i = 0; i < cB; i++) list.push(mk(i, cB, 'B', bArch, nmB, 97));
  return list.map((u, i) => {
    u.id = i; u.R = 15; u.hp = 46; u.max = 46; u.alive = true;
    u.attMax = 100 + (TRAITS[u.trait].attBonus || 0);
    u.att = u.attMax;
    u.face = u.team === 'A' ? 0 : Math.PI;
    u.rface = u.face; u.rx = u.x; u.ry = u.y;
    u.ox = 0; u.oy = 0; u.flinch = 0; u.phaseT = 0;
    u.priorityId = null; u.moveLeft = 0; u.mt = null;
    u.hand = Math.random() < 0.5 ? 1 : -1;
    u.plan = []; u.tickBudget = TURN_TICKS; u.ticksLeft = TURN_TICKS;
    u.reactDebt = 0; u.reactCd = 0; u.brace = 0;
    u.replans = 0; u.fleeing = false; u.rearAtPlan = null;
    u.swing = null;
    u.pathLen = 0; u.sx = u.x; u.sy = u.y;   // метрики против «цирка»
    return u;
  });
}

// ---- Геометрия и восприятие ----
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const foesOf = u => units.filter(x => x.alive && x.team !== u.team);
function angTo(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function angDiff(a, b) { return Math.atan2(Math.sin(b - a), Math.cos(b - a)); }
const clampX = x => Math.max(18, Math.min(cv.width - 18, x));
const clampY = y => Math.max(18, Math.min(cv.height - 18, y));
function sees(a, t) {
  return dist(a, t) <= coneRange(a)
    && Math.abs(angDiff(a.face, angTo(a, t))) <= coneHalf(a)
    && clearLine(a, t);
}
function canShoot(a, t) {
  return dist(a, t) <= ABIL.shot.range
    && Math.abs(angDiff(a.face, angTo(a, t))) <= coneHalf(a)
    && clearLine(a, t);
}
function nearestFoe(u) {
  return foesOf(u).reduce((p, c) => (!p || dist(u, c) < dist(u, p)) ? c : p, null);
}
function priorityOf(u) {
  let t = units.find(x => x.id === u.priorityId && x.alive && x.team !== u.team);
  if (!t) { t = nearestFoe(u); u.priorityId = t ? t.id : null; }
  return t;
}

// Осознанный доворот — платный поступок (лицо не движется само)
function faceToward(u, tx, ty, costs) {
  const des = Math.atan2(ty - u.y, tx - u.x);
  const diff = angDiff(u.face, des), need = Math.abs(diff);
  if (need < 0.01) return;
  let allowed = need;
  if (costs) {
    const canPay = u.att / TURN_COST;
    allowed = Math.min(need, canPay);
    u.att = Math.max(0, u.att - allowed * TURN_COST);
  }
  u.face += Math.sign(diff) * allowed;
}
function faceTo(u, ang, costs) {
  faceToward(u, u.x + Math.cos(ang) * 40, u.y + Math.sin(ang) * 40, costs);
}
// Куда смотреть, чтобы держать угрозы в конусе (взвешено по близости)
function threatDir(u) {
  const foes = foesOf(u).filter(f => dist(u, f) < CONE_R + 60);
  if (!foes.length) {
    const p = priorityOf(u);
    return p ? angTo(u, p) : u.face;
  }
  let sx = 0, sy = 0;
  for (const f of foes) {
    const w = 1 / (dist(u, f) + 1);
    sx += Math.cos(angTo(u, f)) * w;
    sy += Math.sin(angTo(u, f)) * w;
  }
  return Math.atan2(sy, sx);
}
// Ближний враг вне конуса — угроза спине
function rearThreat(u) {
  let worst = null, wd = coneHalf(u) + 0.2;
  for (const f of foesOf(u)) {
    if (dist(u, f) < 165) {
      const dev = Math.abs(angDiff(u.face, angTo(u, f)));
      if (dev > wd) { wd = dev; worst = f; }
    }
  }
  return worst;
}

// ---- Лог и вылетающий текст ----
function log(m, c) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = m;
  if (c) d.style.color = c;
  el.prepend(d);
  while (el.children.length > 60) el.removeChild(el.lastChild);
}
function floater(x, y, t, c, size) {
  floaters.push({ x, y, t, c, life: 1.2, size: size || 15 });
}

// ---- Очередь событий: по одному, текст + замедление ----
function enqueue(text, color, x, y, apply, dur, frz) {
  queue.push({ text, color, x, y, apply, dur: dur || 0.55, frz: frz || 0 });
}
function pumpBeats(dt) {
  if (beat) {
    beat.t += dt;
    if (beat.t >= beat.dur) beat = null;
    return;
  }
  if (queue.length) {
    const ev = queue.shift();
    if (ev.apply) ev.apply();
    beat = { text: ev.text, color: ev.color, t: 0, dur: ev.dur };
    if (ev.text) {
      floater(ev.x, ev.y - 42, ev.text, ev.color, 16);
      log(ev.text, ev.color);
    }
    if (ev.frz > 0) { slowmo = 0.5; freeze = Math.max(freeze, ev.frz); }
  }
}
const busy = () => !!(beat || queue.length);

// ---- Урон, замах, импакт ----
function applyDamage(t, raw) {
  let r = raw;
  if (t.brace > 0 && r < 900) r *= 0.7;   // собравшийся принимает удар лучше
  const dmg = Math.round(r);
  t.hp = Math.max(0, t.hp - dmg);
  t.flinch = 1.6;
  floater(t.x + t.ox, t.y - 26, '-' + dmg, '#ff5555', 22);
  if (t.hp <= 0) {
    t.alive = false;
    t.swing = null; t.mt = null; t.plan = [];
    log(`✖ ${t.name} повержен`, '#ff4040');
  }
  return dmg;
}
function clash(a, t, ab, flank) {
  const ang = angTo(a, t);
  a.ox += Math.cos(ang) * LUNGE; a.oy += Math.sin(ang) * LUNGE;
  t.ox += Math.cos(ang) * ab.knock * RECOIL_K;
  t.oy += Math.sin(ang) * ab.knock * RECOIL_K;

// ---- Ввод игрока ----
function setAbils(on) {

  for (const id of kit) {

    b.className = 'ab' + (pending === id ? ' sel' : '');
    const price = active ? costOf(active, ab) : ab.cost;
    b.disabled = !on || abilityUsed || (ab.cost && active && active.att < price);
    const sub = ab.cost ? price + '⚡' + (price < ab.cost ? ' ↓' : '') : (ab.restore ? '+' + ab.restore : '');
    b.innerHTML = `<span>${ab.name}</span><small>${sub}</small>`;
    b.onmouseenter = () => { document.getElementById('hint').textContent = `${ab.name} — ${ab.desc}`; };
    b.onclick = () => {
      if (!on || busy() || !active || abilityUsed) return;
      if (ab.kind === 'self') {
        abilityUsed = true;
        if (ab.id === 'hold') doHold(active);
        else doRecover(active);
        pending = null;
        setAbils(true);
      } else if (ab.kind === 'cone') {
        if (active.att >= costOf(active, ab)) {
          abilityUsed = true;

cv.addEventListener('click', e => {

  if (pending) {
    const ab = ABIL[pending];
    if (ab.kind === 'dir') {

      setAbils(true);

    }

      u.alive && u.team !== active.team && Math.hypot(u.x - mx, u.y - my) < 20);

      if (ab.needCone && !canShoot(active, tgt)) {

    const dx = mx - active.x, dy = my - active.y;
    const d = Math.hypot(dx, dy) || 1;
    const mang = Math.atan2(dy, dx);

// ---- Физический кадр: ТОЛЬКО исполнение принятых решений ----
// Единственное, что здесь происходит: идущие доходят, замахи доигрываются,
// эффекты затухают. Никаких новых решений.

    }

    u.oy += (0 - u.oy) * Math.min(1, dt * 9);

    if (u.phaseT > 0) u.phaseT = Math.max(0, u.phaseT - dt);
    if (u.reactCd > 0) u.reactCd = Math.max(0, u.reactCd - dt);
    if (u.brace > 0) u.brace = Math.max(0, u.brace - dt * 0.9);
    if (u.swing) {
      const s = u.swing;
      s.t += dt;

    for (const o of OBST) {
      const dx = u.x - o.x, dy = u.y - o.y;
      const d = Math.hypot(dx, dy), need = o.r + u.R;
      if (d > 0.001 && d < need) {

        u.y += dy / d * p;

    for (const b of units) {

      const dx = u.x - b.x, dy = u.y - b.y;
      const d = Math.hypot(dx, dy), need = u.R + b.R + 4;
      if (d > 0.001 && d < need) {

    u.y = Math.max(u.R, Math.min(cv.height - u.R, u.y));

// ---- Отрисовка ----

    ctx.moveTo(active.rx, active.ry);
    ctx.lineTo(active.mt.x, active.mt.y);
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = 'rgba(124,131,255,.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
  }
  for (const u of units) drawUnit(u);
  for (const ar of arrows) {
    const k = Math.min(1, ar.t / ar.dur);
    const hx = ar.x + (ar.tx - ar.x) * k, hy = ar.y + (ar.ty - ar.y) * k;
    const bk = Math.max(0, k - 0.14);
    const bx = ar.x + (ar.tx - ar.x) * bk, by = ar.y + (ar.ty - ar.y) * bk;
    ctx.globalAlpha = 1 - k * 0.3;
    ctx.strokeStyle = ar.col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(hx, hy);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const b of bursts) {
    const p = 1 - b.life;
    ctx.globalAlpha = Math.max(0, b.life);
    ctx.strokeStyle = b.flank ? '#ff5c5c' : '#ffe08a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6 + p * 34, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  if (beat) {
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = beat.color;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(beat.text, cv.width / 2, 32);
    ctx.globalAlpha = 1;
  }
  for (const fl of floaters) {
    ctx.globalAlpha = Math.max(0, fl.life);
    ctx.fillStyle = fl.c;
    ctx.font = `bold ${fl.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(fl.t, fl.x, fl.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- Главный цикл ----
let lastT = 0;
function loop(t) {
  const dtReal = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  now = t;
  if (slowmo < 1) slowmo = Math.min(1, slowmo + dtReal / 0.5);
  if (freeze > 0) {
    freeze = Math.max(0, freeze - dtReal);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  const dt = dtReal * slowmo;
  pumpBeats(dt);
  if (phase === 'resolve' && !busy() && !anyMover()) {
    phase = 'between';
    advance();
  }
  simStep(dt);
  shake = shake > 0.2 ? shake * 0.86 : 0;
  for (const b of bursts) b.life -= dtReal * 2.6;
  bursts = bursts.filter(b => b.life > 0);
  for (const ar of arrows) ar.t += dtReal;
  arrows = arrows.filter(ar => ar.t < ar.dur);
  for (const fl of floaters) {
    fl.y -= 16 * dtReal;
    fl.life -= dtReal * 0.9;
  }
  floaters = floaters.filter(fl => fl.life > 0);
  if (phase === 'choose') updateStatus();
  draw();
  requestAnimationFrame(loop);
}

// ---- Настройки и запуск ----
const cl = (v, lo, hi) => Math.max(lo, Math.min(hi, isNaN(v) ? lo : v));
function syncCfg() {
  nA = cl(nA, 1, 10); nB = cl(nB, 1, 10);
  aArch = cl(aArch, 0, nA); bArch = cl(bArch, 0, nB);
  aiAllies = cl(aiAllies, 0, nA);
  const g = id => document.getElementById(id);
  g('nAIn').value = nA; g('nBIn').value = nB;
  g('aArchIn').value = aArch; g('bArchIn').value = bArch;
  g('aiIn').value = aiAllies;
  g('aArchIn').max = nA; g('bArchIn').max = nB; g('aiIn').max = nA;
}
{
  const bind = (id, set) => {
    const el = document.getElementById(id);
    el.onchange = () => { set(parseInt(el.value, 10)); syncCfg(); initBattle(); };
  };
  bind('nAIn', v => { nA = v; });
  bind('nBIn', v => { nB = v; });
  bind('aArchIn', v => { aArch = v; });
  bind('bArchIn', v => { bArch = v; });
  bind('aiIn', v => { aiAllies = v; });
  const td = document.getElementById('tickdurIn');
  td.value = TICK_DUR;
  td.oninput = () => {
    const v = parseFloat(td.value);
    if (v > 0.05) TICK_DUR = v;
  };
}
function resolveSpawns() {
  // Никто не рождается внутри камня
  for (const u of units) {
    for (const o of OBST) {
      let dx = u.x - o.x, dy = u.y - o.y;
      let d = Math.hypot(dx, dy);
      const need = o.r + u.R + 4;
      if (d < 0.001) { dx = 1; dy = 0; d = 1; }
      if (d < need) {
        u.x = clampX(o.x + dx / d * need);
        u.y = clampY(o.y + dy / d * need);
      }
    }
  }
}
function initBattle() {
  syncCfg();
  OBST = makeObstacles();
  units = makeUnits(nA, nB);
  resolveSpawns();
  round = 0;
  active = null;
  phase = 'init';
  queue = [];
  beat = null;
  slowmo = 1;
  floaters = [];
  bursts = [];
  arrows = [];
  pending = null;
  abilityUsed = false;
  freeze = 0;
  shake = 0;
  units.forEach(u => { u.priorityId = null; });
  document.getElementById('banner').style.display = 'none';
  log('Тиковый бой: мир движется только поступками. Реакции платные, конус решает всё.', '#8fa1d0');
  startRound();
}
initBattle();
requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
</script>
